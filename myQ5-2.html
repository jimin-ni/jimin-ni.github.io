<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div style="height: auto; width: 650px; border: 2px solid black;"> 
        <h1>프런트엔드 개발자 지원서</h1>
        <p>HTML, CSS, Javascript에 대한 이해와 경험이 있는 분을 찾습니다.</p>
        <hr> 
    
    <form>
            <h3>개인 정보</h3>
            <table>
                <tr>
                    <th><label for="sname">이름</label></th>
                    <td><input id="sname" type="text" size="20" autofocus required
                placeholder="공백없이 입력하세요"> <br></td>
                </tr>
                <tr>
                    <th><label for="stel">연락처</label></th>
                    <td><input id="stel" type="tel" size="20" autofocus required> <br></td>
                </tr>
            </table>
    
            <h3>지원분야</h3>
            <ul>
                <li type="none"><label><input type="radio" name="field" value="a1"> 웹 퍼블리싱 </label></li>
                <li type="none"><label><input type="radio" name="field" value="a2"> 웹 애플리케이션 개발 </label></li>
                <li type="none"><label><input type="radio" name="field" value="a3"> 개발환경개선 </label></li>
            </ul>
    
            <h3>지원 동기</h3>
            <textarea cols="60" rows="5"
                placeholder="본사 지원 동기를 간략히 써 주세요" ></textarea>
                <div>
                    <button type="submit">접수하기</button>
                    <button type="submit">다시쓰기</button>
                </div>
        </form>
    </div>

</body>
</html>
